# yaml-language-server: $schema=https://gh-dash.dev/schema.json
prSections:
  - title: Ready
    filters: is:open draft:false
  - title: Drafts
    filters: is:open draft:true
  - title: My PRs
    filters: is:open author:@me
issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
defaults:
  preview:
    open: false
    width: 0.45
    position: bottom
    height: 0.6
    prsLimit: 20
    prApproveComment: lgtm
    issuesLimit: 20
    notificationsLimit: 20
    view: prs
  layout:
    prs:
      repo:
        hidden: true
      author:
        width: 25
  refetchIntervalMinutes: 30
keybindings:
  prs:
    - key: R
      name: rerun failed checks
      command: >-
        gh pr checks {{.PrNumber}} --repo {{.RepoName}} --json state,link
        | jq -r '.[] | select(.state=="FAILURE") | .link'
        | grep -oE 'runs/[0-9]+' | grep -oE '[0-9]+' | sort -u
        | xargs -I{} gh run rerun {} --repo {{.RepoName}} --failed
    - key: M
      name: add me as reviewer
      command: gh pr edit {{.PrNumber}} --repo {{.RepoName}} --add-reviewer guychouk
    - key: W
      name: review in worktree
      command: cd {{.RepoPath}}; and set -l wt (git-worktree-pr {{.PrNumber}}); and cd $wt; and exec vim -c GitReview
    - key: S
      name: claude review and notify
      command: nohup pr-review {{.RepoPath}} {{.PrNumber}} >/tmp/pr-review-{{.PrNumber}}.log 2>&1 &
    - key: O
      name: open pr review in vim
      command: cd {{.RepoPath}}; and exec vim (git-worktree-pr -p {{.PrNumber}})/pr-review.md
repoPaths:
  factify-inc/mono: /Users/guychouk/projects/factify/mono
theme:
  ui:
    sectionsShowCount: false
    table:
      showSeparator: true
      compact: true
pager:
  diff: ""
confirmQuit: false
showAuthorIcons: false
smartFilteringAtLaunch: true
includeReadNotifications: true
