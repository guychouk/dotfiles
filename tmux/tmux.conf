# Minimal config for SSH-from-iOS prompting workflow.
set -g mouse on
set -g history-limit 100000
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB"
set -sg escape-time 10
set -g status-interval 5
set -g focus-events on
set -g status-right ""
set -g base-index 1
setw -g pane-base-index 1
setw -g window-status-format " #W "
setw -g window-status-current-format " #W "
setw -g window-status-separator "│"
setw -g window-status-current-style "reverse"

# Larger scrollback-friendly key: prefix + [ enters copy-mode; q exits. Standard.
# Detach on iOS keyboards that lack Ctrl: also bind prefix d (default) and prefix D.
bind D detach
set -g history-limit 10000
